services:
  # ── Backend FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: hotel-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false          # se carga manualmente en el dashboard de Render
      - key: ADMIN_KEY
        sync: false          # clave para acciones críticas del backoffice (se carga en el dashboard)
      - key: ALLOWED_ORIGINS
        value: "https://hotel-landing.onrender.com"
      - key: BASE_URL
        value: "https://hotel-backend-4xgz.onrender.com"
      - key: CHROMA_PERSIST_DIRECTORY
        value: /data/chroma_db
      - key: MEDIA_DIR
        value: /data/uploads_img
      - key: AGENT_PROFILE_PATH
        value: ./data/agent_profiles/hotel.json
      - key: TWILIO_ACCOUNT_SID
        sync: false          # se carga manualmente en el dashboard de Render
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1

  # ── Landing React (Static Site) ───────────────────────────────────────────
  - type: web
    name: hotel-landing
    runtime: static
    rootDir: landing
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: "https://hotel-backend-4xgz.onrender.com"

# ── Base de datos PostgreSQL ──────────────────────────────────────────────
databases:
  - name: hotel-db
    databaseName: hotel
    user: hotel
