name: Backend tests

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'backend/requirements-dev.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          # Tests determinísticos no requieren API key de OpenAI.
          OPENAI_API_KEY: "ci-not-used"
          # Usar SQLite en memoria para evitar levantar Postgres en CI.
          DATABASE_URL: "sqlite:///test.db"
        run: |
          python -m pytest tests/ -q
